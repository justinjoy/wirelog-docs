name: Deploy to justinjoy.github.io/wirelog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wirelog-docs
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install dependencies
        run: bundle install

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Checkout justinjoy.github.io
        uses: actions/checkout@v4
        with:
          repository: justinjoy/justinjoy.github.io
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: deploy-repo

      - name: Copy built site to wirelog directory
        run: |
          rm -rf deploy-repo/wirelog
          mkdir -p deploy-repo/wirelog
          cp -r _site/* deploy-repo/wirelog/

      - name: Commit and push to justinjoy.github.io
        working-directory: deploy-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wirelog/
          git commit -m "chore: update wirelog docs from $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
